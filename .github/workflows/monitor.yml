name: Level Alert Monitor

on:
  schedule:
    - cron: '*/8 * * * *'  # cada 5 minutos
  workflow_dispatch:        # también ejecutable manualmente

jobs:
  check-level:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client twilio

      - name: Escribir credentials.json
        run: echo '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json

      - name: Escribir token.pickle
        run: echo '${{ secrets.GMAIL_TOKEN }}' | base64 -d > token.pickle

      - name: Ejecutar monitor
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
          TWILIO_FLOW_SID:    ${{ secrets.TWILIO_FLOW_SID }}
        run: python check_level.py
